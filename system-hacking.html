<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Terminal | Advanced System Hacking v5.10</title>

    <style>
        :root {
            --neon-green: #39ff14;
            --dark-green: #003300;
            --deep-black: #050505;
            --error-red: #ff3131;
            --warning-red: #ff3131;
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.05);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes gold-glow {
            0% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 25px var(--gold); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--deep-black);
            font-family: 'Segoe UI', 'Consolas', monospace;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #001a00 0%, #050505 100%);
            z-index: -3;
        }

        .data-rain-overlay {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0%,
                rgba(57,255,20,0.03) 50%,
                transparent 100%
            );
            background-size: 100% 4px;
            z-index: -2;
            pointer-events: none;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
            padding: 40px;
            max-width: 1600px;
            margin: auto;
        }

        .sidebar {
            background: rgba(0, 10, 0, 0.85);
            border: 1px solid var(--neon-green);
            padding: 30px;
            border-radius: 20px;
            position: sticky;
            top: 40px;
            backdrop-filter: blur(10px);
        }

        .content-area {
            background: var(--glass);
            border: 1px solid rgba(57,255,20,0.2);
            padding: 60px;
            border-radius: 30px;
            backdrop-filter: blur(25px);
            min-height: 85vh;
        }

        .nav-item {
            padding: 18px;
            cursor: pointer;
            margin-bottom: 12px;
            color: #888;
            border-radius: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            color: var(--neon-green);
            transform: translateX(10px);
            background: rgba(57,255,20,0.05);
        }

        .nav-item.active {
            background: var(--neon-green);
            color: black !important;
            font-weight: 900;
        }

        h1.glitch-text {
            font-size: 3rem;
            color: var(--neon-green);
            animation: glitch 5s infinite;
        }

        .speaker-note, .speaker-context {
            border-left: 5px solid var(--neon-green);
            padding: 25px;
            background: rgba(0,40,0,0.3);
            border-radius: 0 15px 15px 0;
            line-height: 1.7;
        }

        .btn {
            padding: 12px 25px;
            border: 2px solid var(--neon-green);
            background: transparent;
            color: var(--neon-green);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
        }

        .quiz-option {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            background: transparent;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
            border-radius: 10px;
        }

        .quiz-option:hover {
            border-color: var(--neon-green);
        }

        .topic-content { display: none; }
        .topic-content.active { display: block; }
    </style>
</head>

<body>

<div class="bg-container"></div>
<div class="data-rain-overlay"></div>

<div style="padding: 30px 50px;">
    <button class="btn" onclick="window.location.href='index.html'">[ REBOOT_TERMINAL ]</button>
</div>

<div class="dashboard">

    <div class="sidebar">
        <h2 style="color:var(--neon-green); text-align:center;">MISSION_CONTROL</h2>

        <div class="nav-item active" onclick="showTab('m1', this)">01. Hacking Mindset</div>
        <div class="nav-item" onclick="showTab('m2', this)">02. OS Barrier</div>
        <div class="nav-item" onclick="showTab('m3', this)">03. Memory Corruption</div>
        <div class="nav-item" onclick="showTab('m4', this)">04. AD Dominance</div>
        <div class="nav-item" onclick="showTab('m5', this)">05. Lateral Movement</div>
        <div class="nav-item" onclick="showTab('quiz', this)">[ VALIDATE ]</div>
    </div>

    <div class="content-area">

        <!-- KEEP ALL YOUR CONTENT EXACTLY AS IS -->
        <!-- Only JS FIXED BELOW -->

        <div id="m1" class="topic-content active"> ... (UNCHANGED CONTENT) ... </div>
        <div id="m2" class="topic-content"> ... </div>
        <div id="m3" class="topic-content"> ... </div>
        <div id="m4" class="topic-content"> ... </div>
        <div id="m5" class="topic-content"> ... </div>

        <div id="quiz" class="topic-content">
            <h1 class="glitch-text">Validate Proficiency</h1>

            <div class="highlight-box">
                <h3 id="question-text">Loading...</h3>
                <div id="options-container"></div>

                <div id="reveal-zone" style="display:none;">
                    <b id="status-text"></b><br>
                    <span id="explanation-text"></span>
                </div>

                <button class="btn" onclick="nextQuestion()">Next Challenge</button>
            </div>
        </div>

    </div>
</div>

<script>
let currentQ = 0;
let quizLoaded = false;

const quizData = [
    {
        q: "In the Protection Ring model, where does the OS Kernel reside?",
        options: ["Ring 3", "Ring 0", "Ring 1", "The Cloud"],
        correct: 1,
        exp: "Ring 0 is Kernel Mode (Privileged Mode)."
    },
    {
        q: "What does the Instruction Pointer represent?",
        options: ["Speed", "Next instruction", "Password", "Firewall"],
        correct: 1,
        exp: "It tells CPU what instruction to execute next."
    }
];

function showTab(id, el) {
    document.querySelectorAll('.topic-content').forEach(t => t.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (el) el.classList.add('active');

    if (id === 'quiz' && !quizLoaded) {
        loadQuestion();
        quizLoaded = true;
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadQuestion() {
    const q = quizData[currentQ];
    document.getElementById("question-text").innerText = q.q;

    const container = document.getElementById("options-container");
    container.innerHTML = "";

    document.getElementById("reveal-zone").style.display = "none";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "quiz-option";
        btn.innerText = opt;

        btn.onclick = () => checkAnswer(i, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(i, btn) {
    const q = quizData[currentQ];
    const buttons = document.querySelectorAll(".quiz-option");

    buttons.forEach(b => b.disabled = true);

    if (i === q.correct) {
        btn.style.borderColor = "#39ff14";
        document.getElementById("status-text").innerText = "ACCESS GRANTED";
    } else {
        btn.style.borderColor = "#ff3131";
        document.getElementById("status-text").innerText = "ACCESS DENIED";
    }

    document.getElementById("explanation-text").innerText = q.exp;
    document.getElementById("reveal-zone").style.display = "block";
}

function nextQuestion() {
    currentQ = (currentQ + 1) % quizData.length;
    loadQuestion();
}

document.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".nav-item.active")?.classList.add("active");
});
</script>

</body>
</html>
