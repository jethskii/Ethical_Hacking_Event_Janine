<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical Hacking Seminar | Intro</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --glass-bg: rgba(0, 255, 65, 0.05);
            --border-glow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
        }

        /* --- BACKGROUND LAYER 1: MOVING MESH --- */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -4;
            background: linear-gradient(45deg, #000 25%, #051a05 50%, #000 75%);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- BACKGROUND LAYER 2: 3D TILTING GRID --- */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background-image: 
                linear-gradient(var(--neon-green) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-green) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.1;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* --- BACKGROUND LAYER 3: FLOATING ICONS & NODES --- */
        .floating-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .node {
            position: absolute;
            background: var(--neon-green);
            border-radius: 50%;
            filter: blur(4px);
            box-shadow: 0 0 15px var(--neon-green);
            animation: bounce 10s infinite ease-in-out;
        }

        .icon {
            position: absolute;
            color: var(--neon-green);
            font-size: 1.5rem;
            opacity: 0.3;
            animation: floatUp 15s infinite linear;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30vw, 20vh); }
            50% { transform: translate(60vw, -10vh); }
            75% { transform: translate(20vw, 40vh); }
        }

        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- UI ELEMENTS --- */
        .page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            text-transform: uppercase;
            letter-spacing: 12px;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green);
            margin: 0;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.7; }
        }

        .profile-card {
            margin: 40px;
            padding: 35px;
            border: 1px solid var(--neon-green);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: var(--border-glow);
            transition: 0.3s;
        }

        .profile-card:hover {
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.8);
            transform: scale(1.02);
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.4s;
            background: rgba(0, 0, 0, 0.5);
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        /* SCANLINE EFFECT */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <div class="floating-elements">
        <div class="node" style="width: 12px; height: 12px; left: 15%; top: 20%;"></div>
        <div class="node" style="width: 8px; height: 8px; left: 80%; top: 70%; animation-delay: -3s;"></div>
        
        <div class="icon" style="left: 10%; animation-duration: 12s;">💻</div>
        <div class="icon" style="left: 85%; animation-duration: 18s; animation-delay: -5s;">&lt;/&gt;</div>
        <div class="icon" style="left: 50%; animation-duration: 14s; animation-delay: -2s;">🔐</div>
    </div>

    <div class="page">
        <h1 class="hero-title">Ethical Hacking</h1>
        <div style="letter-spacing: 6px; margin-top: 10px; color: #888;">SEMINAR EVENT // APRIL 17, 2026</div>

        <div class="profile-card">
            <div style="font-size: 1.8rem; color: var(--neon-green); font-weight: bold;">
                Mrs. Janine K. Mandalones - Flores
            </div>
            <div style="color: #bbb; margin-top: 8px; font-size: 0.9rem; text-transform: uppercase;">
                Software Engineer - Application Developer
            </div>
        </div>

        <div class="btn-container">
            <a href="system-hacking.html" class="btn">System Hacking</a>
            <a href="web-app-security.html" class="btn">Web App Security</a>
        </div>
    </div>

</body>
</html>
