<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical Hacking Seminar | Intro</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --glass-bg: rgba(0, 255, 65, 0.03);
            --border-glow: 0 0 20px rgba(0, 255, 65, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
        }

        /* 1. ANIMATED MESH & GRID BACKGROUND */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: radial-gradient(circle at center, #0a2a0a 0%, #000 70%);
            animation: meshMove 10s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(var(--neon-green) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-green) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
        }

        /* 2. FLOATING HACKER ELEMENTS (Floating Laptops/Balls) */
        .floating-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .node {
            position: absolute;
            background: var(--neon-green);
            border-radius: 50%;
            filter: blur(5px);
            box-shadow: 0 0 15px var(--neon-green);
            opacity: 0.6;
            animation: bounce 8s infinite ease-in-out;
        }

        .hardware-icon {
            position: absolute;
            color: var(--neon-green);
            font-size: 2rem;
            opacity: 0.2;
            animation: float 12s infinite linear;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-50vh) translateX(20vw); }
            50% { transform: translateY(-10vh) translateX(50vw); }
            75% { transform: translateY(-80vh) translateX(80vw); }
        }

        @keyframes float {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* 3. CONTENT STYLING */
        .page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            backdrop-filter: brightness(0.8);
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 5.5rem);
            text-transform: uppercase;
            letter-spacing: 15px;
            color: var(--neon-green);
            text-shadow: var(--border-glow);
            margin: 0;
            filter: drop-shadow(0 0 10px var(--neon-green));
        }

        .profile-card {
            margin: 30px;
            padding: 40px;
            border: 2px solid var(--neon-green);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 5px;
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.2), var(--border-glow);
            position: relative;
        }

        .profile-card::before {
            content: "SECURE_PROFILE_LOADED";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--dark-bg);
            padding: 0 10px;
            font-size: 0.7rem;
            color: var(--neon-green);
        }

        .btn-container {
            display: flex;
            gap: 25px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 35px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            background: transparent;
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 40px var(--neon-green);
            transform: translateY(-5px);
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 255, 65, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <div class="floating-elements">
        <div class="node" style="width: 10px; height: 10px; left: 10%; animation-delay: 0s;"></div>
        <div class="node" style="width: 20px; height: 20px; left: 80%; animation-delay: -2s;"></div>
        <div class="node" style="width: 15px; height: 15px; left: 40%; animation-delay: -5s;"></div>
        
        <div class="hardware-icon" style="left: 15%; animation-duration: 15s;">💻</div>
        <div class="hardware-icon" style="left: 75%; animation-duration: 20s; animation-delay: -5s;">&lt;/&gt;</div>
        <div class="hardware-icon" style="left: 50%; animation-duration: 18s; animation-delay: -10s;">📡</div>
    </div>

    <div class="page">
        <h1 class="hero-title">Ethical Hacking</h1>
        <div style="letter-spacing: 8px; margin-top: 15px; color: #888;">SEMINAR EVENT // APRIL 17, 2026</div>

        <div class="profile-card">
            <div style="font-size: 2rem; color: var(--neon-green); margin-bottom: 10px;">Mrs. Janine K. Mandalones - Flores</div>
            <div style="color: #ccc; letter-spacing: 3px; font-size: 0.8rem; text-transform: uppercase;">Software Engineer - Application Developer</div>
        </div>

        <div class="btn-container">
            <a href="system-hacking.html" class="btn">System Hacking</a>
            <a href="web-app-security.html" class="btn">Web App Security</a>
        </div>
    </div>

</body>
</html>
