<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical Hacking Seminar | Intro</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --glass-bg: rgba(0, 0, 0, 0.6); /* Darker glass to make text pop over video */
            --border-glow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
        }

        /* --- VIDEO BACKGROUND --- */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -5;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            filter: brightness(0.4) contrast(1.2); /* Helps readability */
        }

        /* --- OVERLAYS (Grid & Scanlines) --- */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background-image: 
                linear-gradient(var(--neon-green) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-green) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.1;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.3;
        }

        /* --- FLOATING DECOR --- */
        .floating-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .icon {
            position: absolute;
            color: var(--neon-green);
            font-size: 1.5rem;
            opacity: 0.4;
            animation: floatUp 15s infinite linear;
        }

        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- CONTENT --- */
        .page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.5) 100%);
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            text-transform: uppercase;
            letter-spacing: 12px;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green);
            margin: 0;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.8; }
        }

        .profile-card {
            margin: 40px;
            padding: 35px;
            border: 2px solid var(--neon-green);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-radius: 4px;
            box-shadow: var(--border-glow);
            transition: 0.3s;
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.4s;
            background: rgba(0, 0, 0, 0.7);
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="janine.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <div class="floating-elements">
        <div class="icon" style="left: 10%; animation-duration: 12s;">💻</div>
        <div class="icon" style="left: 85%; animation-duration: 18s; animation-delay: -5s;">&lt;/&gt;</div>
        <div class="icon" style="left: 50%; animation-duration: 14s; animation-delay: -2s;">🔐</div>
        <div class="icon" style="left: 20%; animation-duration: 20s; animation-delay: -8s;">📡</div>
    </div>

    <div class="page">
        <h1 class="hero-title">Ethical Hacking</h1>
        <div style="letter-spacing: 6px; margin-top: 10px; color: #888; font-weight: bold;">SEMINAR EVENT // APRIL 17, 2026</div>

        <div class="profile-card">
            <div style="font-size: 1.8rem; color: var(--neon-green); font-weight: bold;">
                Mrs. Janine K. Mandalones - Flores
            </div>
            <div style="color: #bbb; margin-top: 8px; font-size: 0.9rem; text-transform: uppercase;">
                Software Engineer - Application Developer
            </div>
        </div>

        <div class="btn-container">
            <a href="system-hacking.html" class="btn">System Hacking</a>
            <a href="web-app-security.html" class="btn">Web App Security</a>
        </div>
    </div>

</body>
</html>
